# CareerPilot artifact registry — implementation step 7 of claude.md.
#
# Every artifact here is grounded in the corpus: `grounded_in` cites the
# document titles, headings, or resume entries that establish it. Nothing
# in this file was invented; edit it freely — it is the human-reviewable
# definition of your artifacts, and scripts/assign_artifacts.py treats it
# as the source of truth.
#
# Fields per artifact:
#   slug        stable identifier (used as artifacts.slug in Postgres)
#   name        canonical display name
#   type        project | hackathon | professional_experience | education
#   aliases     names matched (word-boundary, case-insensitive; ALL-CAPS
#               aliases of <= 4 chars match case-sensitively) against
#               chunk headings and text to assign evidence
#   documents   corpus files that are wholly about this artifact — every
#               chunk in them is assigned to it
#   grounded_in corpus evidence that establishes the artifact (audit note)

artifacts:
